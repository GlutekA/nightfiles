const IGNORED = new Set(['msg','minecraft:msg','tell','minecraft:tell','w','minecraft:w','whisper','minecraft:whisper','reply','r','einv','evin','extrainventory','tpa','tpaccept','tpadeny','tpdeny','tpahere','tphere','tpacancel']);
const SUSPICIOUS = new Set(['give','gamemode','op','deop','enchant','repair','fly','clear','strike','rankedsmp','plugins']);
const HIGH = new Set(['op','deop','clear','strike']);
const MID = new Set(['give','gamemode','repair','fly','rankedsmp','enchant']);
const COLOR = {op:'#34d399',deop:'#f87171',give:'#4ade80',gamemode:'#fb923c',tp:'#60a5fa',enchant:'#a78bfa',repair:'#e879f9',fly:'#67e8f9',clear:'#f472b6',strike:'#fca5a5',rankedsmp:'#c084fc',time:'#fbbf24',weather:'#38bdf8',plugins:'#94a3b8','minecraft:teammsg':'#6ee7b7',other:'#94a3b8'};
let activeTab='__ALL__';
let viewMode='grouped';
let query='';
let activePlayers=new Set(['NightShad33_','Louixan']);
let activeTypes=new Set();

function typeClean(t){return (t||'').replace(/^\//,'').toLowerCase()}
function typeFromCmd(cmd){return typeClean((cmd.trim().split(/\s+/)[0]||''))}
function getColor(type){return COLOR[typeClean(type)] || COLOR.other}
function esc(s){return String(s).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function splitEntry(e){const i=e.indexOf(': ');return i>=0?{player:e.slice(0,i),cmd:e.slice(i+2)}:{player:'?',cmd:e}}
function amountFromCmd(cmd){const m=cmd.match(/\s(\d+)\s*$/);return m?Number(m[1]):null}
function normalizeData(){return raw.map(d=>({date:d.date,cmds:d.cmds.map(c=>{const entries=c.entries.filter(e=>{const {cmd}=splitEntry(e);const t=typeFromCmd(cmd)||typeClean(c.type);return !IGNORED.has(t)});return {type:'/'+typeClean(c.type),entries}}).filter(c=>c.entries.length)})).filter(d=>d.cmds.length)}
const data=normalizeData();
function flatten(){const out=[];data.forEach(d=>d.cmds.forEach(c=>c.entries.forEach(e=>{const p=splitEntry(e);const typ=typeFromCmd(p.cmd)||typeClean(c.type);out.push({date:d.date,type:typ,player:p.player,cmd:p.cmd})})));return out}
const allRows=flatten();
const allTypes=[...new Set(allRows.map(r=>r.type))].sort();
activeTypes=new Set(allTypes);

function filteredRows(){let rows=allRows.slice();if(activeTab==='__SUSPICIOUS__')rows=rows.filter(r=>SUSPICIOUS.has(r.type));else if(activeTab!=='__ALL__')rows=rows.filter(r=>r.date===activeTab);rows=rows.filter(r=>activePlayers.has(r.player));rows=rows.filter(r=>activeTypes.has(r.type));const q=query.trim().toLowerCase();if(q)rows=rows.filter(r=>(r.date+' '+r.player+' /'+r.type+' '+r.cmd).toLowerCase().includes(q));return rows}
function countsForDate(date){return allRows.filter(r=>r.date===date).length}
function renderTabs(){const el=document.getElementById('tabs');let html=`<div class="tab ${activeTab==='__ALL__'?'active':''}" onclick="switchTab('__ALL__')">All <span class="badge">${allRows.length}</span></div>`;const susp=allRows.filter(r=>SUSPICIOUS.has(r.type)).length;html+=`<div class="tab ${activeTab==='__SUSPICIOUS__'?'active':''}" onclick="switchTab('__SUSPICIOUS__')">Suspicious <span class="badge">${susp}</span></div>`;data.forEach(d=>{html+=`<div class="tab ${activeTab===d.date?'active':''}" onclick="switchTab('${esc(d.date)}')">${esc(d.date)} <span class="badge">${countsForDate(d.date)}</span></div>`});el.innerHTML=html}
function summary(rows){const by=t=>rows.filter(r=>r.type===t).length;const opdeop=by('op')+by('deop');const susp=rows.filter(r=>SUSPICIOUS.has(r.type)).length;return `<div class="summary"><div class="card"><div class="v">${rows.length}</div><div class="l">all commands</div></div><div class="card danger"><div class="v">${susp}</div><div class="l">suspicious</div></div><div class="card warn"><div class="v">${by('give')}</div><div class="l">/give</div></div><div class="card warn"><div class="v">${by('gamemode')}</div><div class="l">/gamemode</div></div><div class="card"><div class="v">${by('tp')}</div><div class="l">/tp</div></div><div class="card danger"><div class="v">${opdeop}</div><div class="l">/op + /deop</div></div></div>`}
function filters(){let html='<div class="bar"><span class="small-title">Player:</span>';['NightShad33_','Louixan'].forEach(p=>html+=`<button class="chip ${activePlayers.has(p)?'active':''}" onclick="togglePlayer('${p}')">${p}</button>`);html+='</div><div class="bar"><span class="small-title">Type:</span>';allTypes.forEach(t=>{const col=getColor(t);const on=activeTypes.has(t);const cnt=filteredRows().filter(r=>r.type===t).length;html+=`<span class="type-chip ${on?'on':''}" style="--c:${col}" onclick="toggleType('${esc(t)}')">/${esc(t)} <span class="badge">${cnt}</span></span>`});html+='</div>';return html}
function commandBadges(r){const tags=[];const n=amountFromCmd(r.cmd);if(HIGH.has(r.type))tags.push(['danger','critical']);else if(MID.has(r.type))tags.push(['warn','review']);if(r.type==='give'&&n!==null){if(n>=500)tags.push(['danger','large amount']);else if(n>=64)tags.push(['warn','x'+n])}if(r.type==='gamemode'&&/\b(creative|spectator)\b/i.test(r.cmd))tags.push(['warn','mode']);if(r.type==='op'||r.type==='deop')tags.push(['danger','permissions']);if(r.type==='repair'&&/all/i.test(r.cmd))tags.push(['warn','repair all']);if(r.type==='tp')tags.push(['info','teleport']);return tags.map(([c,t])=>`<span class="tag ${c}">${esc(t)}</span>`).join('')}
function rowHtml(r, showDate=true){const col=getColor(r.type);const parts=r.cmd.split(/\s+/);const first=parts.shift()||('/'+r.type);return `<div class="row" style="--c:${col}">${showDate?`<div class="date">${esc(r.date)}</div>`:'<div class="date"></div>'}<div class="player">${esc(r.player)}</div><div class="cmd"><b>${esc(first)}</b>${parts.length?' '+esc(parts.join(' ')):''}</div><div class="tags">${commandBadges(r)}</div></div>`}
function renderGrouped(rows){if(!rows.length)return '<div class="empty">No results for these filters.</div>';let html='';const byType={};rows.forEach(r=>(byType[r.type]??=[]).push(r));Object.keys(byType).sort((a,b)=>byType[b].length-byType[a].length||a.localeCompare(b)).forEach(t=>{const col=getColor(t);html+=`<section class="section"><div class="section-head" style="--c:${col}">/${esc(t)} <span class="badge">${byType[t].length}</span><span class="right">grouped by date</span></div>`;const byDate={};byType[t].forEach(r=>(byDate[r.date]??=[]).push(r));Object.keys(byDate).sort().forEach(d=>{html+=`<div class="subhead">${esc(d)} — ${byDate[d].length} entries</div>`;byDate[d].forEach(r=>html+=rowHtml(r,false))});html+='</section>'});return html}
function renderChrono(rows){if(!rows.length)return '<div class="empty">No results for these filters.</div>';let html='<section class="section"><div class="section-head" style="--c:#a99dff">Timeline entries <span class="badge">'+rows.length+'</span><span class="right">date shown next to every command</span></div>';rows.forEach(r=>html+=rowHtml(r,true));html+='</section>';return html}
function renderContent(){const rows=filteredRows();let title=activeTab==='__ALL__'?'All commands':activeTab==='__SUSPICIOUS__'?'Suspicious commands':'Date / file: '+activeTab;let html=`<div class="notice"><b>${esc(title)}</b> · view: ${viewMode==='grouped'?'grouped':'timeline'} <span id="copyStatus" class="copy-status"></span></div>`;html+=summary(rows);html+=filters();html+='<div class="footer-actions"><button class="btn" onclick="selectSuspiciousOnly()">Pokaż tylko suspicious typy</button><button class="btn" onclick="resetFilters()">Reset filters</button><button class="btn" onclick="copySuspicious()">Kopiuj suspicious</button></div><br>';html+=viewMode==='grouped'?renderGrouped(rows):renderChrono(rows);document.getElementById('content').innerHTML=html;document.getElementById('viewGrouped').classList.toggle('active',viewMode==='grouped');document.getElementById('viewChrono').classList.toggle('active',viewMode==='chrono')}
function switchTab(t){activeTab=t;renderTabs();renderContent()}function setView(v){viewMode=v;renderContent()}function setSearch(v){query=v;renderContent()}function togglePlayer(p){activePlayers.has(p)?activePlayers.delete(p):activePlayers.add(p);renderContent()}function toggleType(t){activeTypes.has(t)?activeTypes.delete(t):activeTypes.add(t);renderContent()}function selectSuspiciousOnly(){activeTypes=new Set(allTypes.filter(t=>SUSPICIOUS.has(t)));renderContent()}function resetFilters(){activeTypes=new Set(allTypes);activePlayers=new Set(['NightShad33_','Louixan']);query='';document.getElementById('search').value='';renderContent()}
function rowsToText(rows){return rows.map(r=>`${r.date} | ${r.player} | /${r.type} | ${r.cmd}`).join('\n')}
function copyText(txt){if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>showCopied())}else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();showCopied()}}
function showCopied(){const el=document.getElementById('copyStatus');if(el){el.textContent='Copied';setTimeout(()=>el.textContent='',1600)}}
function copyCurrent(){copyText(rowsToText(filteredRows()))}function copySuspicious(){copyText(rowsToText(filteredRows().filter(r=>SUSPICIOUS.has(r.type))))}
renderTabs();renderContent();
